spring:
  profiles:
    active: ${PROFILE:dev}

--- # servlet multipart
spring:
  servlet:
    multipart:
      max-file-size: 30MB
      max-request-size: 30MB

--- # api link checker
api:
  checker:
    storage:
      filepath: ${user.home}/api-status.json

--- # aws s3
cloud:
  aws:
    credentials:
      access-key: ${AWS_ACCESS_KEY}
      secret-key: ${AWS_SECRET_KEY}
    region:
      static: ${AWS_REGION}
    stack:
      auto: false
    s3:
      bucket-name: ${S3_BUCKET_NAME}

--- # OAuth2
oauth2:
  naver:
    client-id: ${NAVER_CLIENT_ID}
    client-secret: ${NAVER_CLIENT_SECRET}
    redirect-uri: ${NAVER_REDIRECT_URI}
    token-uri: ${NAVER_TOKEN_URI}
    user-info-uri: ${NAVER_USER_INFO_URI}
  kakao:
    client-id: ${KAKAO_CLIENT_ID}
    client-secret: ${KAKAO_CLIENT_SECRET}
    redirect-uri: ${KAKAO_REDIRECT_URI}
    token-uri: ${KAKAO_TOKEN_URI}
    user-info-uri: ${KAKAO_USER_INFO_URI}

--- # jwt
jwt:
  secret-key: ${JWT_KEY:exampleSecretKeyForIlmansaSystemAccessSecretKeyTestForPadding}
  issuer: ${JWT_ISSUER:ilmansa}
  expiration:
    access-token: ${JWT_AT_EXPIRATION:1800000}
    refresh-token: ${JWT_RT_EXPIRATION:86400000}

--- # firebase
firebase:
  key: ${FIREBASE_KEY}

--- # email
spring:
  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: false
          connectiontimeout: 5000
          timeout: 5000
          writetimeout: 5000
